experiment_name: base
seed: 42
device: cuda:0
output_dir: ./outputs/base

data:
  scenario: roadnetsz_fuhua
  data_dir: ./data
  custom_roadnet_path: null
  custom_flow_path: null
  custom_engine_config_path: null
  roadnetsz_variant: fuhua_2490

env:
  control_interval: 5
  episode_horizon: 360
  yellow_time: 3
  all_red_time: 1
  min_green: 10
  max_green: 60
  stack_k: 4
  normalize_obs: true
  reward:
    alpha_delay: 1.0
    beta_queue: 0.5
    gamma_switch: 0.05
    eta_throughput: 0.2
    zeta_unfairness: 0.0
    speed_threshold: 0.1

model:
  hidden_dim: 128
  gat_heads: 4
  gat_layers: 3
  dropout: 0.1
  max_phases: 8

dynamics:
  hidden_dim: 128
  action_dim: 32
  horizon: 5
  train_horizon: 5
  ensemble_size: 5
  lambda_multistep: 0.5
  lambda_phase: 2.0
  lambda_uncertainty: 0.1
  uncertainty_threshold: 0.25
  teacher_forcing_ratio: 1.0
  free_rollout_ratio: 0.5
  rollout_schedule: linear
  prior_weight: 0.2
  uncertainty_mode: threshold_ranked
  uncertainty_rank_metric: uncertainty
  uncertainty_keep_topk: 128
  pessimism_coef: 0.25

ppo:
  lr: 3.0e-4
  value_lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_ratio: 0.2
  entropy_coef: 0.01
  value_coef: 0.5
  grad_clip: 1.0
  rollout_steps: 256
  epochs: 4
  minibatch_size: 64
  total_updates: 200

training:
  batch_size: 64
  world_model_batch_size: 256
  world_model_num_workers: 4
  world_model_prefetch_factor: 4
  world_model_pin_memory: true
  bc_batch_size: 256
  bc_num_workers: 4
  bc_prefetch_factor: 4
  bc_pin_memory: true
  real_ratio: 0.7
  model_ratio: 0.3
  collect_episodes: 20
  world_model_epochs: 20
  bc_epochs: 5
  eval_every: 10
  model_start_state_strategy: real_buffer
  model_start_state_count: 4
  rollout_keep_ratio_log: true
  max_model_samples_per_update: 4096
  max_real_samples_per_update: 4096
  model_selection_strategy: priority_coverage
  priority_alpha: 1.0
  priority_beta: 0.5
  priority_metrics: [uncertainty, reward, queue_proxy]
  coverage_selection: true
  coverage_bins:
    queue: 4
    phase: 4
    uncertainty: 4
  coverage_min_fraction: 0.1
  coverage_feature_set: [queue, phase, uncertainty]
  offline_policy_mix:
    fixed_time: 0.35
    max_pressure: 0.35
    random_phase: 0.30
  offline_epsilon: 0.1
  flow_perturbation_levels: [0.0]

model_augmentation:
  enabled: true
  real_strategy: random
  model_strategy: random

policy_guidance:
  enabled: false
  batch_size: 8
  state_strategy: latest
  coef: 0.1
  min_score_gap: 0.0
  max_uncertainty: 0.15
  mode: first_action_rerank
  candidate_count: 4
  plan_count: 4
  include_greedy: true
  horizon: 2
  discount: 0.99
  uncertainty_coef: 0.1
  pessimism_coef: 0.25
  future_action_mode: greedy

decision:
  enabled: true
  eval_enabled: true
  mode: sequence_shooting
  candidate_count: 4
  plan_count: 4
  include_greedy: true
  horizon: 3
  discount: 0.99
  uncertainty_coef: 0.1
  pessimism_coef: 0.25
  future_action_mode: greedy
