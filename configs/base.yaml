experiment_name: base
seed: 42
device: cpu
output_dir: ./outputs/base

data:
  scenario: roadnetsz_fuhua
  data_dir: ./data
  custom_roadnet_path: null
  custom_flow_path: null
  custom_engine_config_path: null
  roadnetsz_variant: fuhua_2490

env:
  control_interval: 5
  episode_horizon: 360
  yellow_time: 3
  all_red_time: 1
  min_green: 10
  max_green: 60
  stack_k: 4
  normalize_obs: true
  reward:
    alpha_delay: 1.0
    beta_queue: 0.5
    gamma_switch: 0.05
    eta_throughput: 0.2
    zeta_unfairness: 0.0
    speed_threshold: 0.1

model:
  hidden_dim: 128
  gat_heads: 4
  gat_layers: 3
  dropout: 0.1
  max_phases: 8

dynamics:
  hidden_dim: 128
  action_dim: 32
  horizon: 5
  train_horizon: 5
  ensemble_size: 5
  lambda_multistep: 0.5
  lambda_phase: 2.0
  lambda_uncertainty: 0.1
  uncertainty_threshold: 0.25
  teacher_forcing_ratio: 1.0
  free_rollout_ratio: 0.5
  rollout_schedule: linear
  prior_weight: 0.2

ppo:
  lr: 3.0e-4
  value_lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_ratio: 0.2
  entropy_coef: 0.01
  value_coef: 0.5
  grad_clip: 1.0
  rollout_steps: 256
  epochs: 4
  minibatch_size: 64
  total_updates: 200

training:
  batch_size: 64
  real_ratio: 0.7
  model_ratio: 0.3
  collect_episodes: 20
  world_model_epochs: 20
  bc_epochs: 5
  eval_every: 10
  model_start_state_strategy: real_buffer
  model_start_state_count: 4
  rollout_keep_ratio_log: true
  max_model_samples_per_update: 4096
  max_real_samples_per_update: 4096
  offline_policy_mix:
    fixed_time: 0.35
    max_pressure: 0.35
    random_phase: 0.30
  offline_epsilon: 0.1
  flow_perturbation_levels: [0.0]
